<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RELAX NAS TRAVELS</title>

<style>
body {margin:0;font-family:Poppins;background:#000;color:#fff;}

.header {
  height:100vh;
  background:linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
  url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957') no-repeat center/cover;
  display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;
}

.header h1 {color:#D4AF37;font-size:50px;}

.btn {
  background:#D4AF37;color:#000;padding:12px 25px;text-decoration:none;
  border-radius:25px;cursor:pointer;border:none;
}

.section {padding:70px;text-align:center;}

.features {display:flex;flex-wrap:wrap;justify-content:center;gap:20px;}

.box {
  background:#111;padding:20px;border-radius:10px;cursor:pointer;
}

.seats {display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:20px;}

.seat {
  width:40px;height:40px;background:#444;border-radius:5px;cursor:pointer;
}

.selected {background:#D4AF37;}

.popup {
  display:none;position:fixed;top:20%;left:50%;transform:translateX(-50%);
  background:#111;padding:20px;border-radius:10px;
}
</style>

<script>
let price = 800;
let serviceCharge = 50;

function showSeats(){
  document.getElementById("seatSection").style.display="block";
}

function toggleSeat(el){
  el.classList.toggle("selected");
  updateTotal();
}

function updateTotal(){
  let selected = document.querySelectorAll(".selected").length;
  let total = (selected * price) + serviceCharge;
  document.getElementById("total").innerText = "Total: " + total + " BDT";
}

function bookNow(){
  let seats = document.querySelectorAll(".selected").length;
  let total = (seats * price) + serviceCharge;

  let msg = "Booking RELAX Bus\nSeats: "+seats+"\nTotal: "+total+" BDT";
  window.open("https://wa.me/8801XXXXXXXXX?text="+encodeURIComponent(msg));
}

function showFeature(name){
  alert(name);
}
</script>

</head>

<body>

<div class="header">
  <h1>RELAX</h1>
  <p>Travel in Comfort & Luxury</p>
  <button class="btn" onclick="showSeats()">Book Now</button>
</div>

<div class="section">
<h2>About Us</h2>
<p>RELAX is a premium bus service by NAS GROUP OF COMPANIES.</p>
</div>

<div class="section">
<h2>Features</h2>
<div class="features">
<div class="box" onclick="showFeature('Full AC System')">❄️ Full AC</div>
<div class="box" onclick="showFeature('Luxury Seats')">💺 Seats</div>
<div class="box" onclick="showFeature('Sleeper Beds')">🛏️ Sleeper</div>
</div>
</div>

<div class="section" id="seatSection" style="display:none;">
<h2>Select Seats</h2>

<div class="seats">
<script>
for(let i=1;i<=20;i++){
document.write('<div class="seat" onclick="toggleSeat(this)"></div>');
}
</script>
</div>

<p id="total">Total: 850 BDT</p>
<br>
<button class="btn" onclick="bookNow()">Confirm Booking</button>
</div>

<div class="section">
<h2>Route & Time</h2>
<p>Jamalpur → Chattogram (5:00 PM)</p>
<p>Chattogram → Jamalpur (5:00 PM)</p>
</div>

<div class="section">
<h2>Contact</h2>

<a href="tel:01600120731" class="btn">Call Now</a>
<br><br>
<a href="https://wa.me/8801928294511" class="btn">WhatsApp</a>

</div>

</body>
</html>
