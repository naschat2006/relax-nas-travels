<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RELAX BUS BOOKING</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial}

/* HEADER */
.header{
padding:40px;
text-align:center;
background:#111;
border-bottom:2px solid gold;
}
.header h1{color:#D4AF37}

/* BUS CONTAINER */
.bus{
width:90%;
max-width:700px;
margin:20px auto;
background:#111;
border-radius:20px;
padding:20px;
}

/* DRIVER */
.driver{
background:#222;
padding:10px;
text-align:center;
border-radius:10px;
margin-bottom:10px;
}

/* SEAT GRID */
.seat-row{
display:flex;
justify-content:space-between;
margin:5px 0;
}

.left,.right{
display:grid;
grid-template-columns:repeat(2,50px);
gap:8px;
}

.seat{
width:50px;height:50px;
background:#333;
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.selected{background:#D4AF37;color:#000}

/* SECTION LABEL */
.section-title{
text-align:center;
margin:10px 0;
color:gold;
}

/* INFO */
.info{
text-align:center;
margin:10px;
}

/* BUTTON */
.btn{
background:#D4AF37;
color:#000;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
margin:5px;
}
</style>

<script>

let selected=[];
let price=0;

function toggleSeat(id,el){
if(selected.includes(id)){
selected=selected.filter(s=>s!==id);
el.classList.remove("selected");
}else{
selected.push(id);
el.classList.add("selected");
}
}

function confirmBooking(){

let date=document.getElementById("date").value;

if(date==""){
alert("Select Travel Date");
return;
}

let msg=
"RELAX BUS TICKET\n"+
"Date: "+date+"\n"+
"Seats: "+selected.join(", ")+"\n"+
"Total Seats: "+selected.length;

let win=window.open("https://wa.me/8801928294511?text="+encodeURIComponent(msg));

// Ticket Download
let ticket=
`RELAX BUS TICKET\n
Date: ${date}\n
Seats: ${selected.join(", ")}\n
Bus: RELAX PREMIUM\n
`;

let blob=new Blob([ticket],{type:"text/plain"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="ticket.txt";
a.click();
}

</script>

</head>

<body>

<div class="header">
<h1>RELAX PREMIUM BUS</h1>
<p>NAS GROUP OF COMPANIES</p>
</div>

<!-- DATE -->
<div class="info">
<h3>Select Travel Date</h3>
<input type="date" id="date">
</div>

<!-- BUS -->
<div class="bus">

<div class="driver">🚍 Driver Seat (Front)</div>

<h3 class="section-title">🪑 CHAIR COACH</h3>

<!-- FRONT ENTRY -->
<div class="seat-row">

<div class="left">
<div class="seat" onclick="toggleSeat('A1',this)">A1</div>
<div class="seat" onclick="toggleSeat('A2',this)">A2</div>
<div class="seat" onclick="toggleSeat('A5',this)">A5</div>
<div class="seat" onclick="toggleSeat('A6',this)">A6</div>
</div>

<div class="right">
<div class="seat" onclick="toggleSeat('A3',this)">A3</div>
<div class="seat" onclick="toggleSeat('A4',this)">A4</div>
<div class="seat" onclick="toggleSeat('A7',this)">A7</div>
<div class="seat" onclick="toggleSeat('A8',this)">A8</div>
</div>

</div>

<h3 class="section-title">🛏️ SLEEPER COACH</h3>

<div class="seat-row">

<div class="left">
<div class="seat" onclick="toggleSeat('S1',this)">S1</div>
<div class="seat" onclick="toggleSeat('S2',this)">S2</div>
<div class="seat" onclick="toggleSeat('S3',this)">S3</div>
<div class="seat" onclick="toggleSeat('S4',this)">S4</div>
</div>

<div class="right">
<div class="seat" onclick="toggleSeat('S5',this)">S5</div>
<div class="seat" onclick="toggleSeat('S6',this)">S6</div>
<div class="seat" onclick="toggleSeat('S7',this)">S7</div>
<div class="seat" onclick="toggleSeat('S8',this)">S8</div>
</div>

</div>

</div>

<!-- INFO -->
<div class="info">
<p>Chair: 850 BDT | Sleeper: 1250 BDT</p>
<p>Service Charge: 50 BDT</p>
</div>

<!-- BUTTON -->
<div style="text-align:center">
<button class="btn" onclick="confirmBooking()">Confirm Booking + Download Ticket</button>
</div>

</body>
</html>
