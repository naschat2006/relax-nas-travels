<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RELAX NAS TRAVELS</title>

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff}

/* HEADER */
.header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.9)),
url('https://images.unsplash.com/photo-1544620347-c4fd4a3d5957') center/cover;
}
.header h1{color:#D4AF37;font-size:50px}

/* BUTTON */
.btn{
background:#D4AF37;color:#000;padding:12px 25px;
border:none;border-radius:25px;cursor:pointer;margin:5px;
}

/* SECTION */
.section{padding:60px;text-align:center}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.85);
}

.modal-box{
background:#111;
width:90%;
max-width:650px;
margin:50px auto;
padding:20px;
border-radius:10px;
}

/* SEATS */
.seats{
display:grid;
grid-template-columns:repeat(6,50px);
gap:10px;
justify-content:center;
margin-top:20px;
}

.seat{
width:50px;height:50px;
background:#333;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
border-radius:5px;
}
.selected{background:#D4AF37;color:#000}

/* ADMIN */
.admin{
display:none;
padding:20px;
background:#111;
}

.ticket{
background:#222;
padding:10px;
margin:5px;
border-radius:5px;
}
</style>

<script>
let coach="chair";
let seats=[];
let price=0;

function openBooking(){
document.getElementById("modal").style.display="block";
generateSeats();
}

function closeBooking(){
document.getElementById("modal").style.display="none";
seats=[];
}

function setCoach(type){
coach=type;
seats=[];
generateSeats();
updatePrice();
}

function generateSeats(){
let box=document.getElementById("seatBox");
box.innerHTML="";

let count=(coach=="chair")?24:16;

for(let i=1;i<=count;i++){
let id=(coach=="chair"?"C":"S")+i;

box.innerHTML+=`
<div class="seat" onclick="toggleSeat('${id}',this)">
${id}
</div>`;
}
}

function toggleSeat(id,el){
if(seats.includes(id)){
seats=seats.filter(s=>s!==id);
el.classList.remove("selected");
}else{
seats.push(id);
el.classList.add("selected");
}
updatePrice();
}

function updatePrice(){
let base=(coach=="chair")?850:1250;
price=(seats.length*base)+50;

document.getElementById("price").innerText=
"Seats: "+seats.join(", ")+" | Total: "+price+" BDT";
}

function confirmBooking(){

let ticket={
coach:coach,
seats:seats,
price:price,
time:new Date().toLocaleString()
};

// SAVE (future database hook)
let all=JSON.parse(localStorage.getItem("bookings")||"[]");
all.push(ticket);
localStorage.setItem("bookings",JSON.stringify(all));

// WhatsApp
let msg="RELAX BOOKING\nCoach:"+coach+"\nSeats:"+seats+"\nTotal:"+price;
window.open("https://wa.me/8801928294511?text="+encodeURIComponent(msg));
}

// ADMIN PANEL
function openAdmin(){
document.getElementById("admin").style.display="block";
loadTickets();
}

function loadTickets(){
let data=JSON.parse(localStorage.getItem("bookings")||"[]");
let box=document.getElementById("tickets");
box.innerHTML="";

data.forEach((t,i)=>{
box.innerHTML+=`
<div class="ticket">
<b>Booking ${i+1}</b><br>
Coach: ${t.coach}<br>
Seats: ${t.seats}<br>
Price: ${t.price}<br>
Time: ${t.time}
</div>`;
});
}

// PDF (simple demo)
function downloadPDF(){
window.print();
}

</script>

</head>

<body>

<div class="header">
<h1>RELAX</h1>
<p>Premium Bus Service</p>

<button class="btn" onclick="openBooking()">Book Now</button>
<button class="btn" onclick="openAdmin()">Admin Panel</button>
</div>

<div class="section">
<h2>About Us</h2>
<p>RELAX by NAS GROUP OF COMPANIES</p>
</div>

<!-- BOOKING -->
<div class="modal" id="modal">
<div class="modal-box">

<h2 style="color:#D4AF37">Book Your Seat</h2>

<button class="btn" onclick="setCoach('chair')">Chair (850৳)</button>
<button class="btn" onclick="setCoach('sleeper')">Sleeper (1250৳)</button>

<div class="seats" id="seatBox"></div>

<p id="price">Seats: 0 | Total: 0 BDT</p>

<button class="btn" onclick="confirmBooking()">Confirm Booking</button>
<button class="btn" onclick="downloadPDF()">Download Ticket (PDF)</button>
<button class="btn" onclick="closeBooking()">Close</button>

</div>
</div>

<!-- ADMIN -->
<div class="admin" id="admin">
<h2>Admin Panel</h2>

<div id="tickets"></div>

<button class="btn" onclick="loadTickets()">Refresh</button>
</div>

</body>
</html>
